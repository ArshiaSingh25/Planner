    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Smooth Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { 
            background: #334155; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Soft Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            border-color: rgba(56, 189, 248, 0.2);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        /* Progress Bar */
        .progress-bar {
            height: 10px;
            background: #334155;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            border-radius: 5px;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Custom Checkbox */
        input[type="checkbox"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #475569;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: #0f172a;
            font-size: 14px;
            font-weight: 800;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Navigation Buttons */
        .nav-link {
            padding: 10px 24px;
            border-radius: 12px;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--text-sub);
        }
        .nav-link.active {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
        }

        /* Cat Animation */
        @keyframes catRun {
            0% { left: -100px; }
            100% { left: 100%; }
        }

        .cat-container {
            position: fixed;
            bottom: 20px;
            z-index: 50;
            animation: catRun 20s linear infinite;
            pointer-events: none;
            width: 100px;
        }

        .cat-body {
            pointer-events: auto;
            cursor: pointer;
            width: 80px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        /* Speech Bubble */
        .speech-bubble {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #1e293b;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 600;
            width: 200px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 10px solid transparent;
            border-top-color: white;
        }
        .speech-bubble.visible {
            opacity: 1;
        }

        .task-item {
            transition: all 0.2s;
        }
        .task-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }
    </style>
</head>

                            {quote}
                        </div>
                        <img 
                            src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z6eHExZXF4NXp5eHExZXF4NXp5eHExZXF4NXp5eHExZXF4NXp5JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/vFKqnCdLPNOKc/giphy.gif" 
                            className="cat-body" 
                            alt="Running Cat"
                            onClick={handleClick}
                        />
                    </div>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('today');
            const [completedTasks, setCompletedTasks] = useState(() => {
                const saved = localStorage.getItem('cs6910_coder_v3_cozy');
                return saved ? JSON.parse(saved) : {};
            });
            const [startDate] = useState(() => getStartDate());

            const resetStartDate = () => {
                if (window.confirm("Want to restart your journey? ✨")) {
                    const d = new Date();
                    d.setHours(0,0,0,0);
                    localStorage.setItem('cs6910_start_date', d.toISOString());
                    window.location.reload();
                }
            };

            useEffect(() => {
                localStorage.setItem('cs6910_coder_v3_cozy', JSON.stringify(completedTasks));
            }, [completedTasks]);

            const toggleTask = (taskId) => {
                setCompletedTasks(prev => ({ ...prev, [taskId]: !prev[taskId] }));
            };

            const totalTasks = ALL_TASKS.length;
            const completedCount = Object.values(completedTasks).filter(Boolean).length;
            const progressPercent = (completedCount / totalTasks) * 100;

            const today = new Date(); today.setHours(0,0,0,0);
            const currentOffset = daysBetween(startDate, today);

            const todayTasks = useMemo(() => {
                return ALL_TASKS.filter(t => {
                    if (completedTasks[t.id]) return false;
                    return t.dayOffset <= currentOffset;
                });
            }, [completedTasks, currentOffset]);

            const forwardedCount = todayTasks.filter(t => t.dayOffset < currentOffset).length;
            const strictTodayCount = todayTasks.filter(t => t.dayOffset === currentOffset).length;

            return (
                <div className="min-h-screen pb-32">
                    <CatCompanion />

                    <div className="max-w-5xl mx-auto p-6 md:p-12">
                        {/* Header Area */}
                        <header className="mb-12">
                            <div className="flex justify-between items-center mb-10">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-sky-500/20 rounded-xl flex items-center justify-center text-xl">✨</div>
                                    <h1 className="text-3xl font-extrabold tracking-tight">Study Planner</h1>
                                </div>
                                <button 
                                    onClick={resetStartDate}
                                    className="text-xs font-bold text-slate-500 hover:text-rose-400 transition-colors uppercase tracking-widest"
                                >
                                    Reset Progress
                                </button>
                            </div>

                            <div className="card p-8 md:p-10 mb-10 overflow-hidden relative">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-sky-500/10 blur-3xl rounded-full -mr-16 -mt-16"></div>
                                <div className="relative z-10">
                                    <h2 className="text-2xl font-bold mb-4">Deep Learning Mastery</h2>
                                    <p className="text-slate-400 mb-8 max-w-2xl leading-relaxed">{PLAN_DATA.summary}</p>
                                    
                                    <div className="space-y-4">
                                        <div className="flex justify-between text-sm font-bold text-slate-400">
                                            <span>Course Progress</span>
                                            <span className="text-sky-400">{Math.round(progressPercent)}% Complete</span>
                                        </div>
                                        <div className="progress-bar">
                                            <div className="progress-fill" style={{ width: `${progressPercent}%` }} />
                                        </div>
                                        <div className="flex gap-6 text-xs font-bold text-slate-500 uppercase tracking-widest">
                                            <span>{completedCount} Tasks Done</span>
                                            <span>{totalTasks - completedCount} Remaining</span>
                                            <span>Day {currentOffset} of 90</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Nav */}
                            <nav className="flex gap-4 p-1 bg-slate-800/50 rounded-2xl w-fit">
                                <button 
                                    onClick={() => setView('today')}
                                    className={`nav-link ${view === 'today' ? 'active' : ''}`}
                                >
                                    Today's Goals
                                </button>
                                <button 
                                    onClick={() => setView('full_plan')}
                                    className={`nav-link ${view === 'full_plan' ? 'active' : ''}`}
                                >
                                    Full Roadmap
                                </button>
                            </nav>
                        </header>

                        {/* Content */}
                        <main>
                            {view === 'today' && (
                                <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="card p-6">
                                            <div className="text-slate-500 text-xs font-bold uppercase tracking-widest mb-2">Today's Focus</div>
                                            <div className="text-2xl font-bold">{strictTodayCount} Tasks</div>
                                        </div>
                                        <div className="card p-6">
                                            <div className="text-slate-500 text-xs font-bold uppercase tracking-widest mb-2">From Previous Days</div>
                                            <div className="text-2xl font-bold text-amber-400">{forwardedCount} Tasks</div>
                                        </div>
                                    </div>

                                    <div className="card overflow-hidden">
                                        {todayTasks.length === 0 ? (
                                            <div className="py-20 text-center">
                                                <div className="text-sky-400 text-4xl mb-4">🌈</div>
                                                <div className="text-xl font-bold mb-2">You're all caught up!</div>
                                                <p className="text-slate-400">Great job on finishing your goals for today.</p>
                                            </div>
                                        ) : (
                                            <div className="divide-y divide-slate-700/50">
                                                {todayTasks.map(t => (
                                                    <div
                                                        key={t.id}
                                                        onClick={() => toggleTask(t.id)}
                                                        className="task-item flex items-start gap-4 p-6 cursor-pointer"
                                                    >
                                                        <input type="checkbox" checked={!!completedTasks[t.id]} readOnly />
                                                        <div className="flex-1">
                                                            <div className="font-semibold text-lg mb-1">{t.name}</div>
                                                            <div className="text-xs font-bold text-slate-500 uppercase tracking-widest">
                                                                {t.week} • {t.theme}
                                                                {t.dayOffset < currentOffset && <span className="ml-3 text-amber-500">Still Pending</span>}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {view === 'full_plan' && (
                                <div className="space-y-16 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    {PLAN_DATA.weeks.map((week, wIdx) => (
                                        <section key={wIdx}>
                                            <div className="flex items-baseline gap-4 mb-8">
                                                <h3 className="text-2xl font-bold">{week.week}</h3>
                                                <span className="text-slate-500 font-semibold">• {week.theme}</span>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                                {week.days.map((day, dIdx) => (
                                                    <div key={dIdx} className={`card p-5 ${day.day === currentOffset ? 'ring-2 ring-sky-500/50' : ''}`}>
                                                        <div className="flex justify-between items-center mb-4">
                                                            <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">Day {String(day.day).padStart(2, '0')}</span>
                                                            {day.day === currentOffset && <span className="text-[10px] font-bold bg-sky-500/20 text-sky-400 px-2 py-1 rounded-lg">Today</span>}
                                                        </div>
                                                        <div className="space-y-3">
                                                            {day.tasks.map((task, tIdx) => {
                                                                const taskId = `w${wIdx}-d${dIdx}-t${tIdx}`;
                                                                const isDone = !!completedTasks[taskId];
                                                                return (
                                                                    <div
                                                                        key={taskId}
                                                                        onClick={() => toggleTask(taskId)}
                                                                        className={`flex items-start gap-3 p-1 rounded-lg cursor-pointer transition-all hover:bg-white/5 ${isDone ? 'opacity-30' : ''}`}
                                                                    >
                                                                        <input type="checkbox" checked={isDone} readOnly className="mt-0.5 h-3.5 w-3.5" />
                                                                        <span className={`text-xs leading-tight font-medium ${isDone ? 'line-through text-slate-500' : 'text-slate-200'}`}>{task}</span>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    ))}
                                </div>
                            )}
                        </main>

                        <footer className="mt-32 text-center">
                            <div className="text-slate-500 text-xs font-bold uppercase tracking-[0.3em] mb-4">
                                Keep Going • You Are Doing Great
                            </div>
                            <div className="flex justify-center gap-4 text-[10px] text-slate-600 font-bold uppercase tracking-widest">
                                <span>Version 4.0.0</span>
                                <span>•</span>
                                <span>Last Updated {new Date().toLocaleDateString()}</span>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
