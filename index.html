        :root {

        }

        body { 
            background-color: var(--bg); 
            color: #f8fafc; 
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Animated Background Mesh */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(147, 51, 234, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 0%, var(--bg) 100%);
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { 
            background: #1f2937; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }

        /* Glassmorphism */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        .glass-hover:hover {
            border-color: rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        /* Animations */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .scanline {
            width: 100%;
            height: 10px;
            background: linear-gradient(to bottom, transparent, var(--accent-glow), transparent);
            position: absolute;
            opacity: 0.1;
            animation: scanline 8s linear infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px var(--accent-glow); }
            50% { box-shadow: 0 0 20px var(--accent-glow); }
        }

        .glow-pulse {
            animation: pulse-glow 3s infinite;
        }

        .task-row {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .task-row:hover {
            background: rgba(255, 255, 255, 0.03);
            padding-left: 1rem;
        }

        .progress-fill {
            transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(90deg, #00f2ff, #7000ff);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Custom Checkbox */
        input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: #000;
            font-size: 12px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .nav-btn {
            position: relative;
            overflow: hidden;
        }

        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }
    </style>

        }

        function App() {
            const [view, setView] = useState('today');
            const [completedTasks, setCompletedTasks] = useState(() => {
                const saved = localStorage.getItem('cs6910_coder_v2');
                return saved ? JSON.parse(saved) : {};
            });
            const [startDate] = useState(() => getStartDate());

            const resetStartDate = () => {
                if (window.confirm("Reset system clock? This will re-initialize your journey from Day 00.")) {
                    const d = new Date();
                    d.setHours(0,0,0,0);
                    localStorage.setItem('cs6910_start_date', d.toISOString());
                    window.location.reload();
                }
            };

            useEffect(() => {
                localStorage.setItem('cs6910_coder_v2', JSON.stringify(completedTasks));
            }, [completedTasks]);

            const toggleTask = (taskId) => {
                setCompletedTasks(prev => ({ ...prev, [taskId]: !prev[taskId] }));
            };

            const totalTasks = ALL_TASKS.length;
            const completedCount = Object.values(completedTasks).filter(Boolean).length;
            const progressPercent = (completedCount / totalTasks) * 100;

            const today = new Date(); today.setHours(0,0,0,0);
            const currentOffset = daysBetween(startDate, today);

            const todayTasks = useMemo(() => {
                return ALL_TASKS.filter(t => {
                    if (completedTasks[t.id]) return false;
                    return t.dayOffset <= currentOffset;
                });
            }, [completedTasks, currentOffset]);

            const forwardedCount = todayTasks.filter(t => t.dayOffset < currentOffset).length;
            const strictTodayCount = todayTasks.filter(t => t.dayOffset === currentOffset).length;

            const dailyQuote = useMemo(() => {
                // Use the day of year or date as seed
                const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
                return MOTIVATION_QUOTES[dayOfYear % MOTIVATION_QUOTES.length];
            }, []);

            return (
                <div className="relative min-h-screen p-4 md:p-8 lg:p-12 max-w-6xl mx-auto z-10">
                    {/* Top Status Bar */}
                    <div className="flex justify-between items-center mb-8 px-4 mono text-[10px] text-gray-500 uppercase tracking-widest">
                        <div className="flex items-center gap-4">
                            <span className="flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></span>
                                SYSTEM_ACTIVE
                            </span>
                            <span>USER: CODER_X</span>
                        </div>
                        <div className="flex items-center gap-6">
                            <span>UPTIME: {currentOffset} DAYS</span>
                            <button onClick={resetStartDate} className="text-red-400 hover:text-red-300 transition-colors cursor-pointer">
                                [REBOOT_SYSTEM]
                            </button>
                        </div>
                    </div>

                    {/* Header Card */}
                    <header className="glass p-8 md:p-10 mb-12 relative overflow-hidden group">
                        <div className="scanline"></div>
                        <div className="relative z-10">
                            <div className="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-8">
                                <div>
                                    <div className="text-cyan-400 mono text-xs font-bold mb-2 tracking-[0.3em] uppercase">Protocol: Mastery_v3.0</div>
                                    <h1 className="text-4xl md:text-5xl font-extrabold tracking-tighter mb-4 text-white">
                                        CS6910 <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">DEEP_LEARNING</span>
                                    </h1>
                                    <p className="text-gray-400 max-w-2xl text-lg leading-relaxed">{PLAN_DATA.summary}</p>
                                </div>
                                <div className="text-right">
                                    <div className="mono text-2xl font-bold text-white">{Math.round(progressPercent)}%</div>
                                    <div className="mono text-[10px] text-gray-500 tracking-widest">OVERALL_SYNC</div>
                                </div>
                            </div>
                            
                            <div className="space-y-3">
                                <div className="flex justify-between mono text-[11px] text-gray-400">
                                    <span>PROGRESS_MAP</span>
                                    <span>{completedCount} / {totalTasks} NODES_RESOLVED</span>
                                </div>
                                <div className="h-2 w-full bg-gray-900/50 rounded-full overflow-hidden border border-white/5 p-[1px]">
                                    <div className="h-full rounded-full progress-fill" style={{ width: `${progressPercent}%` }} />
                                </div>
                            </div>

                            {/* Motivation Section */}
                            <div className="mt-8 pt-6 border-t border-white/5 mono">
                                <div className="text-[9px] text-cyan-400/60 mb-2 tracking-[0.2em] flex items-center gap-2">
                                    <span className="w-1 h-1 bg-cyan-400 rounded-full animate-pulse"></span>
                                    INBOUND_MOTIVATION_PROTOCOL
                                </div>
                                <div className="text-sm text-cyan-100/80 italic leading-relaxed">
                                    &gt; "{dailyQuote}"
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Navigation Tabs */}
                    <div className="flex gap-2 mb-12 p-1 glass rounded-xl inline-flex w-full md:w-auto">
                        {[
                            { id: 'today', label: `MISSION_CONTROL [D${String(currentOffset).padStart(2,'0')}]` },
                            { id: 'full_plan', label: 'NEURAL_NETWORK_MAP' }
                        ].map(v => (
                            <button
                                key={v.id}
                                onClick={() => setView(v.id)}
                                className={`nav-btn px-6 py-3 rounded-lg mono text-[11px] tracking-[0.15em] transition-all cursor-pointer flex-1 md:flex-none ${view === v.id ? 'active text-cyan-400 bg-white/5' : 'text-gray-500 hover:text-gray-300'}`}
                            >
                                {view === v.id ? '> ' : ''}{v.label}
                            </button>
                        ))}
                    </div>

                    {/* Content Area */}
                    <main>
                        {view === 'today' && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                {/* Stats Row */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {[
                                        { label: 'ACTIVE_OBJECTIVES', val: strictTodayCount, color: 'text-cyan-400' },
                                        { label: 'BACKLOG_PENDING', val: forwardedCount, color: forwardedCount > 0 ? 'text-yellow-500' : 'text-gray-500' },
                                        { label: 'TOTAL_RESOLVED', val: completedCount, color: 'text-purple-400' },
                                    ].map((s, i) => (
                                        <div key={i} className="glass p-6 glass-hover transition-all">
                                            <div className={`text-3xl font-bold mono mb-1 ${s.color}`}>{String(s.val).padStart(2, '0')}</div>
                                            <div className="text-[10px] text-gray-500 mono tracking-widest uppercase">{s.label}</div>
                                        </div>
                                    ))}
                                </div>

                                {/* Task List */}
                                <div className="glass overflow-hidden">
                                    <div className="p-4 border-b border-white/5 bg-white/5 mono text-[10px] text-gray-400 tracking-widest flex justify-between">
                                        <span>CURRENT_QUEUE</span>
                                        <span>TIMESTAMP: {new Date().toLocaleTimeString()}</span>
                                    </div>
                                    <div className="p-2">
                                        {todayTasks.length === 0 ? (
                                            <div className="py-20 text-center">
                                                <div className="text-cyan-400 mono text-lg mb-2">SEQUENCE_COMPLETE</div>
                                                <div className="text-gray-500 text-sm">All objectives for today have been synchronized.</div>
                                            </div>
                                        ) : (
                                            <div className="divide-y divide-white/5">
                                                {todayTasks.map(t => (
                                                    <div
                                                        key={t.id}
                                                        onClick={() => toggleTask(t.id)}
                                                        className="task-row group flex items-start gap-4 p-5 cursor-pointer"
                                                    >
                                                        <input type="checkbox" checked={!!completedTasks[t.id]} readOnly className="mt-1" />
                                                        <div className="flex-1 min-w-0">
                                                            <div className="text-white text-md font-medium mb-1 group-hover:text-cyan-400 transition-colors">{t.name}</div>
                                                            <div className="mono text-[9px] flex items-center gap-3">
                                                                <span className="text-gray-500 uppercase">{t.week} // {t.theme}</span>
                                                                {t.dayOffset < currentOffset && (
                                                                    <span className="text-yellow-500 bg-yellow-500/10 px-2 py-0.5 rounded border border-yellow-500/20 glow-pulse">
                                                                        [CRITICAL_DELAY]
                                                                    </span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'full_plan' && (
                            <div className="space-y-20 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                {PLAN_DATA.weeks.map((week, wIdx) => (
                                    <section key={wIdx}>
                                        <div className="flex flex-col md:flex-row md:items-end gap-2 md:gap-6 mb-10 border-b border-white/10 pb-4">
                                            <h2 className="text-2xl font-bold tracking-tight text-white">{week.week}</h2>
                                            <span className="text-cyan-400 mono text-xs font-semibold tracking-widest mb-1">// {week.theme}</span>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                            {week.days.map((day, dIdx) => (
                                                <div key={dIdx} className={`glass p-5 transition-all ${day.day === currentOffset ? 'ring-1 ring-cyan-500/50 shadow-[0_0_20px_rgba(6,182,212,0.1)]' : ''}`}>
                                                    <div className="flex justify-between items-center mb-4">
                                                        <span className={`mono text-[10px] font-bold ${day.day === currentOffset ? 'text-cyan-400' : 'text-gray-500'}`}>
                                                            DAY_{String(day.day).padStart(2, '0')}
                                                        </span>
                                                        {day.day === currentOffset && <span className="text-[8px] mono bg-cyan-500/10 text-cyan-400 px-1.5 py-0.5 rounded border border-cyan-500/20">LIVE</span>}
                                                    </div>
                                                    <div className="space-y-3">
                                                        {day.tasks.map((task, tIdx) => {
                                                            const taskId = `w${wIdx}-d${dIdx}-t${tIdx}`;
                                                            const isDone = !!completedTasks[taskId];
                                                            return (
                                                                <div
                                                                    key={taskId}
                                                                    onClick={() => toggleTask(taskId)}
                                                                    className={`flex items-start gap-3 p-2 rounded-lg cursor-pointer transition-all hover:bg-white/5 ${isDone ? 'opacity-30' : ''}`}
                                                                >
                                                                    <input type="checkbox" checked={isDone} readOnly className="mt-0.5 h-3.5 w-3.5" />
                                                                    <span className={`text-[11px] leading-snug ${isDone ? 'line-through text-gray-500' : 'text-gray-300'}`}>{task}</span>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                ))}
                            </div>
                        )}
                    </main>

                    <footer className="mt-32 pb-16 text-center mono">
                        <div className="text-[10px] text-gray-600 tracking-[0.4em] mb-4 uppercase">
                            Deep Learning Mastery Protocol v3.0.0 // Phase: {Math.floor(currentOffset/7) + 1}/13
                        </div>
                        <div className="flex justify-center gap-4 text-[9px] text-gray-700">
                            <span>ENCRYPTION: AES-256</span>
                            <span>|</span>
                            <span>NODE_STATUS: STABLE</span>
                            <span>|</span>
                            <span>LAST_SYNC: {new Date().toLocaleDateString()}</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
