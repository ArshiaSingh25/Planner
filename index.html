                        id: `w${wIdx}-d${dIdx}-t${tIdx}`,
                        name: task,
                        week: week.week,
                        theme: week.theme,
                        dayOffset: day.day,
                        dayLabel: `DAY_${String(day.day).padStart(2, '0')}`,
                    });
                });
            });
        });

            const saved = localStorage.getItem('cs6910_start_date');

            const d = new Date();
            d.setHours(0,0,0,0);
            localStorage.setItem('cs6910_start_date', d.toISOString());
            return d;
        }

            return Math.floor((b - a) / (1000*60*60*24));
        }

                return ALL_TASKS.filter(t => {
                    if (completedTasks[t.id]) return false; // already done
                    return t.dayOffset <= currentOffset; // today or overdue
                });
            }, [completedTasks, currentOffset]);

                            </div>

                            {todayTasks.length === 0 ? (
                                <div className="border border-subtle p-8 text-center text-gray-600 text-sm tracking-widest">
                                    ALL_TASKS_RESOLVED. COMMIT &amp; PUSH.
                                </div>
                            ) : (
                                <div className="space-y-2">
                                    {forwardedCount > 0 && (
                                        <div className="text-[9px] text-yellow-700 tracking-widest mb-3 pl-1">
                                            // WARNING: {forwardedCount} TASK(S) CARRIED OVER FROM PREVIOUS DAYS
                                        </div>
                                    )}
                                    {todayTasks.map(t => (
                                        <div
                                            key={t.id}
                                            onClick={() => toggleTask(t.id)}
                                            className="task-row flex items-start gap-3 p-3 border border-subtle cursor-pointer"
                                            style={{ borderLeftColor: t.dayOffset < currentOffset ? '#854d0e' : '#222', borderLeftWidth: t.dayOffset < currentOffset ? '2px' : '1px' }}
                                        >
                                            <input type="checkbox" checked={!!completedTasks[t.id]} readOnly className="mt-1 h-3 w-3" />
                                            <div className="flex-1 min-w-0">
                                                <div className="text-[12px] leading-snug">{t.name}</div>
                                                <div className="text-[9px] text-gray-600 mt-1 tracking-widest">
                                                    {t.dayLabel} // {t.week} // {t.theme}
                                                    {t.dayOffset < currentOffset && <span className="text-yellow-800 ml-2">[OVERDUE]</span>}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    {/* FULL PLAN VIEW */}
                    {view === 'full_plan' && (
                        <div className="space-y-16">
                            {PLAN_DATA.weeks.map((week, wIdx) => (
                                <section key={wIdx}>
                                    <div className="flex items-baseline gap-4 mb-8 border-b border-subtle pb-2">
                                        <h2 className="text-xl font-bold tracking-tighter">{week.week}</h2>
                                        <span className="text-gray-600 text-[10px] font-medium tracking-widest">// {week.theme}</span>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-12">
                                        {week.days.map((day, dIdx) => (
                                            <div key={dIdx} className="space-y-4">
                                                <div className={`text-[10px] font-bold border-l-2 pl-2 ${day.day === currentOffset ? 'text-white border-white' : day.day < currentOffset ? 'text-gray-700 border-gray-800' : 'text-gray-500 border-gray-800'}`}>
                                                    DAY_{String(day.day).padStart(2, '0')}
                                                    {day.day === currentOffset && <span className="ml-2 text-[8px] tracking-widest">[TODAY]</span>}
                                                </div>
                                                <div className="space-y-3">
                                                    {day.tasks.map((task, tIdx) => {
                                                        const taskId = `w${wIdx}-d${dIdx}-t${tIdx}`;
                                                        const isDone = !!completedTasks[taskId];
                                                        return (
                                                            <div
                                                                key={taskId}
                                                                onClick={() => toggleTask(taskId)}
                                                                className={`task-row group flex items-start gap-3 p-2 border border-transparent hover:border-subtle cursor-pointer transition-all ${isDone ? 'opacity-30' : ''}`}
                                                            >
                                                                <input type="checkbox" checked={isDone} readOnly className="mt-1 h-3 w-3" />
                                                                <span className={`text-[11px] leading-tight transition-all ${isDone ? 'line-through' : ''}`}>{task}</span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            ))}
                        </div>
                    )}

                    <footer className="mt-24 border-t border-subtle pt-8 pb-12 text-center">
                        <div className="text-[10px] text-gray-600 tracking-[0.2em]">
                            STATUS: ACTIVE | USER: CODER | VERSION: 3.0.0 | DAY_{String(currentOffset).padStart(2,'0')}_OF_90
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
